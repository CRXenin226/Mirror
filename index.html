<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>镜子程序</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        #container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #333;
        }
        
        #controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        button, select, input[type="range"] {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        button {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        #mirror-container {
            position: relative;
            width: 100%;
            height: 600px;
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .mirror-video {
            transform: scaleX(-1);
        }
        
        #mirror-container.dual-mode {
            gap: 4px;
            padding: 4px;
            background-color: #1a2a33;
        }
        
        #mirror-container.dual-mode video {
            width: 50%;
        }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        label {
            font-size: 14px;
            color: #666;
        }
        
        #start-btn {
            margin-bottom: 10px;
        }
        
        #status-message {
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
        
        #status-message.error {
            background-color: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>镜子程序</h1>
        
        <div id="controls">
            <button id="start-btn">开始照镜子</button>
            
            <div class="control-group">
                <label for="mirror-type">镜子类型：</label>
                <select id="mirror-type" disabled>
                    <option value="single">单面镜</option>
                    <option value="single-mirror">单面镜像</option>
                    <option value="double">双面镜</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="brightness">亮度：</label>
                <input type="range" id="brightness" min="0" max="2" step="0.1" value="1">
            </div>
            
            <div class="control-group">
                <label for="zoom">放大：</label>
                <input type="range" id="zoom" min="0.5" max="2" step="0.1" value="1">
            </div>
            
            <button id="fullscreen">全屏</button>
        </div>
        
        <div id="status-message">点击"开始照镜子"按钮，允许摄像头权限</div>
        
        <div id="mirror-container">
            <video id="normal-video" autoplay muted playsinline style="display: none;"></video>
            <video id="mirror-video" class="mirror-video" autoplay muted playsinline style="display: none;"></video>
        </div>
    </div>
    
    <script>
        // 获取DOM元素
        const normalVideo = document.getElementById('normal-video');
        const mirrorVideo = document.getElementById('mirror-video');
        const startBtn = document.getElementById('start-btn');
        const mirrorTypeSelect = document.getElementById('mirror-type');
        const brightnessSlider = document.getElementById('brightness');
        const zoomSlider = document.getElementById('zoom');
        const fullscreenButton = document.getElementById('fullscreen');
        const mirrorContainer = document.getElementById('mirror-container');
        const statusMessage = document.getElementById('status-message');
        
        // 状态变量
        let currentStream = null;
        
        // 更新状态信息
        function setStatus(text, isError = false) {
            statusMessage.textContent = text;
            if (isError) {
                statusMessage.classList.add('error');
            } else {
                statusMessage.classList.remove('error');
            }
        }
        
        // 停止媒体轨道
        function stopMediaTracks(stream) {
            if (stream && typeof stream.getTracks === 'function') {
                stream.getTracks().forEach(track => {
                    track.stop();
                });
            }
        }
        
        // 清理之前的流
        function cleanUpPreviousStream() {
            if (currentStream) {
                stopMediaTracks(currentStream);
                if (normalVideo.srcObject === currentStream) normalVideo.srcObject = null;
                if (mirrorVideo.srcObject === currentStream) mirrorVideo.srcObject = null;
                currentStream = null;
            } else {
                [normalVideo, mirrorVideo].forEach(v => {
                    if (v.srcObject) {
                        const oldStream = v.srcObject;
                        if (oldStream instanceof MediaStream) {
                            stopMediaTracks(oldStream);
                        }
                        v.srcObject = null;
                    }
                });
            }
        }
        
        // 更新镜子模式
        function updateMirrorMode() {
            const mirrorType = mirrorTypeSelect.value;
            
            if (mirrorType === 'single') {
                // 单面镜模式（镜像视角）
                mirrorContainer.classList.remove('dual-mode');
                normalVideo.style.display = 'none';
                mirrorVideo.style.display = 'block';
            } else if (mirrorType === 'single-mirror') {
                // 单面镜像模式（正常视角）
                mirrorContainer.classList.remove('dual-mode');
                normalVideo.style.display = 'block';
                mirrorVideo.style.display = 'none';
            } else {
                // 双面镜模式
                mirrorContainer.classList.add('dual-mode');
                normalVideo.style.display = 'block';
                mirrorVideo.style.display = 'block';
            }
        }
        
        // 更新视频效果
        function updateVideoEffects() {
            const brightness = parseFloat(brightnessSlider.value);
            const zoom = parseFloat(zoomSlider.value);
            
            [normalVideo, mirrorVideo].forEach(video => {
                video.style.filter = `brightness(${brightness})`;
                video.style.transform = video === mirrorVideo ? `scaleX(-1) scale(${zoom})` : `scale(${zoom})`;
            });
        }
        
        // 启动摄像头
        async function startMirror() {
            // 清理上一次流
            cleanUpPreviousStream();
            
            // 禁用按钮
            startBtn.disabled = true;
            mirrorTypeSelect.disabled = true;
            setStatus('请求摄像头权限...');
            
            // 浏览器支持检查
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus('您的浏览器不支持摄像头访问', true);
                startBtn.disabled = false;
                return;
            }
            
            // 约束：优先前置摄像头
            const constraints = {
                video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            };
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                
                // 将流绑定到两个视频
                normalVideo.srcObject = stream;
                mirrorVideo.srcObject = stream;
                
                // 播放视频
                const playPromise1 = normalVideo.play();
                const playPromise2 = mirrorVideo.play();
                
                await Promise.all([playPromise1, playPromise2]);
                
                // 更新模式
                updateMirrorMode();
                updateVideoEffects();
                
                // 启用控件
                mirrorTypeSelect.disabled = false;
                setStatus('镜子已开启');
                startBtn.disabled = false;
                
                // 监听摄像头断开事件
                const track = stream.getVideoTracks()[0];
                if (track) {
                    track.addEventListener('ended', () => {
                        setStatus('摄像头连接断开', true);
                        cleanUpPreviousStream();
                        mirrorTypeSelect.disabled = true;
                        startBtn.disabled = false;
                    });
                }
                
            } catch (err) {
                console.error('getUserMedia 错误:', err);
                
                // 尝试降级（不带 facingMode）
                if (err.name === 'OverconstrainedError' || err.message?.includes('facingMode')) {
                    setStatus('前置摄像头不可用，尝试任意摄像头...');
                    try {
                        const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                        currentStream = fallbackStream;
                        
                        normalVideo.srcObject = fallbackStream;
                        mirrorVideo.srcObject = fallbackStream;
                        
                        await Promise.all([normalVideo.play(), mirrorVideo.play()]);
                        
                        updateMirrorMode();
                        updateVideoEffects();
                        
                        mirrorTypeSelect.disabled = false;
                        setStatus('镜子已开启 (非前置摄像头)');
                        startBtn.disabled = false;
                        
                        const track = fallbackStream.getVideoTracks()[0];
                        track?.addEventListener('ended', () => {
                            setStatus('摄像头连接断开', true);
                            cleanUpPreviousStream();
                            mirrorTypeSelect.disabled = true;
                            startBtn.disabled = false;
                        });
                        
                        return;
                    } catch (fallbackErr) {
                        console.error('降级失败:', fallbackErr);
                        err = fallbackErr;
                    }
                }
                
                // 错误处理
                cleanUpPreviousStream();
                let errorMsg = '';
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    errorMsg = '权限被拒绝。请允许摄像头访问。';
                } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                    errorMsg = '未找到摄像头。请连接摄像头。';
                } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                    errorMsg = '摄像头被其他应用占用。';
                } else {
                    errorMsg = `错误: ${err.message || err}`;
                }
                setStatus(errorMsg, true);
                startBtn.disabled = false;
                mirrorTypeSelect.disabled = true;
            }
        }
        
        // 全屏功能
        fullscreenButton.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                mirrorContainer.requestFullscreen().catch(err => {
                    console.error(`全屏错误: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });
        
        // 事件监听
        startBtn.addEventListener('click', startMirror);
        mirrorTypeSelect.addEventListener('change', updateMirrorMode);
        brightnessSlider.addEventListener('input', updateVideoEffects);
        zoomSlider.addEventListener('input', updateVideoEffects);
        
        // 页面关闭前释放资源
        window.addEventListener('beforeunload', function() {
            if (currentStream) {
                stopMediaTracks(currentStream);
            }
        });
    </script>
</body>
</html>
